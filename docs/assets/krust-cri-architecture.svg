<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">krust-cri architecture</title>
  <desc id="desc">A Kubernetes client talks to k3s and kubelet. Kubelet calls the macOS-hosted krust-cri runtime over CRI. krust-cri uses Apple Containerization, LinuxPod, Virtualization.framework, and VmnetNetwork to run workload pods.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .panel-blue { fill: #eff6ff; stroke: #93c5fd; stroke-width: 2; rx: 14; }
      .panel-green { fill: #ecfdf5; stroke: #86efac; stroke-width: 2; rx: 14; }
      .panel-amber { fill: #fffbeb; stroke: #fbbf24; stroke-width: 2; rx: 14; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 10; }
      .box-blue { fill: #dbeafe; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .box-green { fill: #d1fae5; stroke: #059669; stroke-width: 2; rx: 10; }
      .box-amber { fill: #fef3c7; stroke: #d97706; stroke-width: 2; rx: 10; }
      .box-purple { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 2; rx: 10; }
      .title { font: 700 28px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 500 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .label { font: 700 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 500 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .mono { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #1e293b; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow); }
      .arrow-green { fill: none; stroke: #059669; stroke-width: 3; marker-end: url(#arrow-green); }
      .line { fill: none; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect class="bg" width="1180" height="720"/>

  <text x="48" y="54" class="title">krust-cri position in the k3s demo</text>
  <text x="48" y="82" class="subtitle">The runtime lives on macOS: kubelet calls it over CRI, and it drives Apple Containerization to run Linux pods.</text>

  <rect x="48" y="120" width="310" height="140" class="panel"/>
  <text x="72" y="154" class="label">Developer / test client</text>
  <rect x="78" y="178" width="112" height="48" class="box"/>
  <text x="104" y="207" class="mono">kubectl</text>
  <rect x="216" y="178" width="112" height="48" class="box"/>
  <text x="246" y="207" class="mono">crictl</text>
  <text x="78" y="246" class="small">applies pods, reads logs, checks node status</text>

  <rect x="430" y="120" width="310" height="210" class="panel-green"/>
  <text x="454" y="154" class="label">Control LinuxPod</text>
  <text x="454" y="176" class="small">Linux arm64 VM launched by Apple Containerization</text>
  <rect x="462" y="202" width="246" height="48" class="box-green"/>
  <text x="562" y="231" text-anchor="middle" class="mono">k3s server</text>
  <rect x="462" y="268" width="246" height="48" class="box-green"/>
  <text x="560" y="297" text-anchor="middle" class="mono">embedded kubelet</text>

  <rect x="812" y="120" width="320" height="210" class="panel-blue"/>
  <text x="836" y="154" class="label">macOS host</text>
  <text x="836" y="176" class="small">Swift daemon and Apple runtime APIs</text>
  <rect x="844" y="202" width="256" height="58" class="box-blue"/>
  <text x="972" y="227" text-anchor="middle" class="label">krust-cri</text>
  <text x="972" y="246" text-anchor="middle" class="tiny">CRI runtime.v1 Unix socket</text>
  <rect x="844" y="278" width="256" height="38" class="box"/>
  <text x="972" y="302" text-anchor="middle" class="mono">RuntimeService + ImageService</text>

  <rect x="48" y="390" width="1084" height="250" class="panel-amber"/>
  <text x="72" y="424" class="label">Apple execution layer on macOS</text>
  <text x="72" y="446" class="small">krust-cri maps Kubernetes pod sandboxes to Apple LinuxPods and reports pod IPs/logs/stats back through CRI.</text>

  <rect x="86" y="484" width="214" height="92" class="box-amber"/>
  <text x="193" y="516" text-anchor="middle" class="label">Apple Containerization</text>
  <text x="193" y="540" text-anchor="middle" class="tiny">ImageStore, EXT4 rootfs, LinuxPod</text>
  <text x="193" y="558" text-anchor="middle" class="tiny">vminitd guest agent</text>

  <rect x="356" y="484" width="214" height="92" class="box-purple"/>
  <text x="463" y="516" text-anchor="middle" class="label">Virtualization.framework</text>
  <text x="463" y="540" text-anchor="middle" class="tiny">VZVirtualMachineManager</text>
  <text x="463" y="558" text-anchor="middle" class="tiny">Linux VM lifecycle</text>

  <rect x="626" y="484" width="196" height="92" class="box-green"/>
  <text x="724" y="516" text-anchor="middle" class="label">VmnetNetwork</text>
  <text x="724" y="540" text-anchor="middle" class="tiny">pod IP allocation</text>
  <text x="724" y="558" text-anchor="middle" class="tiny">same-node pod TCP</text>

  <rect x="878" y="472" width="206" height="116" class="box-blue"/>
  <text x="981" y="504" text-anchor="middle" class="label">Workload pods</text>
  <text x="981" y="528" text-anchor="middle" class="tiny">one Apple LinuxPod per</text>
  <text x="981" y="546" text-anchor="middle" class="tiny">Kubernetes PodSandbox</text>
  <text x="981" y="568" text-anchor="middle" class="mono">busybox/httpd/etc.</text>

  <path d="M190 178 C245 128, 360 128, 462 202" class="arrow"/>
  <text x="294" y="137" class="tiny">kubectl talks to k3s API</text>

  <path d="M708 292 C760 292, 796 260, 844 232" class="arrow"/>
  <text x="736" y="278" class="tiny">CRI runtime.v1</text>
  <text x="736" y="296" class="tiny">socket relay</text>

  <path d="M972 316 C972 372, 248 390, 193 484" class="arrow-green"/>
  <text x="704" y="374" class="tiny">pull images, create pods, start containers</text>

  <path d="M300 530 L356 530" class="arrow-green"/>
  <path d="M570 530 L626 530" class="arrow-green"/>
  <path d="M822 530 L878 530" class="arrow-green"/>

  <path d="M878 588 C760 668, 540 682, 318 610" class="line"/>
  <text x="505" y="676" class="tiny">logs, exit status, stats, pod IP flow back to kubelet through krust-cri</text>

  <rect x="844" y="344" width="256" height="30" class="box"/>
  <text x="972" y="364" text-anchor="middle" class="small">This is the CRI runtime boundary</text>
</svg>
